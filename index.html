<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Dino Duel</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>Color Dino Duel</h1>
        <div class="topbar-right">
          <span>HI <strong id="best-score">00000</strong></span>
          <span><strong id="live-score">00000</strong></span>
        </div>
      </header>

      <section class="controls">
        <label>
          Player 1
          <input id="player-one-name" maxlength="14" placeholder="Player 1" />
        </label>
        <label>
          Player 2
          <input id="player-two-name" maxlength="14" placeholder="Player 2" />
        </label>
        <button id="start-game">Start / Restart</button>
        <button id="roll-btn" disabled>Roll</button>
        <button id="jump-btn" disabled>Jump</button>
      </section>

      <section class="status-row">
        <p><strong>Turn:</strong> <span id="turn-indicator">Player 1</span></p>
        <p><strong>Round:</strong> <span id="round-indicator">1</span>/10</p>
        <p><strong>Roll:</strong> <span id="current-roll">0</span></p>
      </section>

      <section class="arena panel">
        <div class="lane-title">Player 1 Lane</div>
        <div class="dino-lane player-one-lane" id="lane-1"></div>

        <div class="lane-title">Player 2 Lane</div>
        <div class="dino-lane player-two-lane" id="lane-2"></div>

        <p id="message">Press Start to begin!</p>
      </section>

      <section class="panel scores">
        <h2>Live Scores</h2>
        <ul id="score-list"></ul>
      </section>

      <section class="panel leaderboard">
        <h2>Leaderboard (Top 5)</h2>
        <ol id="leaderboard-list"></ol>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
